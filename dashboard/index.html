<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Content Dashboard — Typing Language</title>
  <style>
    /* ============ Reset & Base ============ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0: #0a0e1a;
      --bg-1: #111728;
      --bg-2: #1a2238;
      --bg-3: #232d44;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text-0: #f1f5f9;
      --text-1: #cbd5e1;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --accent: #00d9ff;
      --accent-soft: rgba(0,217,255,0.15);
      --success: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --lang-en: #3b82f6;
      --lang-jp: #ec4899;
      --lang-es: #f59e0b;
      --lang-kr: #10b981;
      --shadow: 0 4px 16px rgba(0,0,0,0.3);
      --radius: 12px;
    }

    html, body {
      background: var(--bg-0);
      color: var(--text-0);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ============ Layout ============ */
    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px 64px;
    }

    /* ============ Header ============ */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .topbar h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d9ff, #ec4899, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar .meta {
      font-size: 12px;
      color: var(--text-3);
    }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      background: var(--bg-2);
      color: var(--text-0);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn:hover { background: var(--bg-3); border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #001a26; border-color: var(--accent); }
    .btn-primary:hover { background: #33e1ff; }

    /* ============ Tabs ============ */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--bg-1);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow-x: auto;
    }
    .tab {
      flex: 1;
      min-width: 140px;
      padding: 10px 16px;
      background: transparent;
      color: var(--text-2);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text-0); background: var(--bg-2); }
    .tab.active { color: #001a26; background: var(--accent); }
    .tab .flag { font-size: 16px; margin-right: 6px; }

    /* ============ Overview Grid ============ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .stat-card .label {
      font-size: 11px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-0);
    }
    .stat-card .delta {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 4px;
    }

    /* ============ Lang Tiles ============ */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .lang-tile {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-left: 4px solid var(--lang-en);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .lang-tile:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: var(--border-strong);
    }
    .lang-tile[data-code="en"] { border-left-color: var(--lang-en); }
    .lang-tile[data-code="jp"] { border-left-color: var(--lang-jp); }
    .lang-tile[data-code="es"] { border-left-color: var(--lang-es); }
    .lang-tile[data-code="kr"] { border-left-color: var(--lang-kr); }

    .lang-tile-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .lang-tile-head .name { font-size: 18px; font-weight: 700; }
    .lang-tile-head .native { font-size: 13px; color: var(--text-2); margin-left: 6px; }
    .lang-tile-head .flag { font-size: 22px; }

    .lang-tile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 11px;
    }
    .lang-tile-stat { color: var(--text-2); }
    .lang-tile-stat strong { color: var(--text-0); font-size: 15px; display: block; }

    /* ============ Language Detail ============ */
    .lang-detail {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }
    .lang-detail-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .lang-detail-head .flag { font-size: 36px; }
    .lang-detail-head .name { font-size: 24px; font-weight: 700; }
    .lang-detail-head .native { font-size: 16px; color: var(--text-2); margin-left: 8px; }
    .lang-detail-head .back {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-3);
      cursor: pointer;
    }
    .lang-detail-head .back:hover { color: var(--accent); }

    /* ============ Two-column comparison ============ */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .compare-col {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .compare-col-head {
      padding: 14px 18px;
      background: var(--bg-3);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .compare-col-head .title { font-weight: 700; font-size: 13px; }
    .compare-col-head .count {
      font-size: 11px;
      color: var(--text-2);
      padding: 2px 8px;
      background: var(--bg-1);
      border-radius: 10px;
    }
    .compare-col-body { padding: 16px; max-height: 600px; overflow-y: auto; }

    /* ============ File list ============ */
    .file-list { list-style: none; }
    .file-list li {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      transition: background 0.1s;
    }
    .file-list li:last-child { border-bottom: none; }
    .file-list li:hover { background: var(--bg-3); }
    .file-list .file-info { flex: 1; min-width: 0; }
    .file-list .file-name { font-weight: 600; color: var(--text-0); }
    .file-list .file-title { color: var(--text-2); font-size: 12px; margin-top: 2px; }
    .file-list .file-meta {
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    /* ============ Stages table ============ */
    .stage-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .stage-table thead { background: var(--bg-3); }
    .stage-table th {
      text-align: left;
      padding: 10px 12px;
      font-weight: 700;
      color: var(--text-2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    .stage-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .stage-table tbody tr:hover { background: var(--bg-3); }
    .stage-table .tier-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      background: var(--bg-3);
      color: var(--text-1);
    }
    .stage-table .tier-pill.tier-0 { background: rgba(99,102,241,0.2); color: #818cf8; }
    .stage-table .tier-pill.tier-1 { background: rgba(16,185,129,0.2); color: #34d399; }
    .stage-table .tier-pill.tier-2 { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .stage-table .tier-pill.tier-3 { background: rgba(236,72,153,0.2); color: #f472b6; }
    .stage-table .tier-pill.tier-4 { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .stage-table .tier-pill.tier-5 { background: rgba(168,85,247,0.2); color: #c084fc; }

    .stage-table .cat-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .stage-table .cat-tag {
      padding: 1px 6px;
      background: var(--bg-3);
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-2);
    }

    /* ============ Corpus sample ============ */
    .corpus-sample {
      background: var(--bg-3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .corpus-sample .display {
      font-weight: 700;
      color: var(--accent);
      font-size: 14px;
      margin-bottom: 4px;
    }
    .corpus-sample .meta { color: var(--text-2); font-size: 11px; }
    .corpus-sample code {
      background: var(--bg-1);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--accent);
      font-size: 11px;
    }

    /* ============ Coverage bar ============ */
    .coverage-bar {
      background: var(--bg-3);
      border-radius: 4px;
      overflow: hidden;
      height: 6px;
      margin-top: 4px;
    }
    .coverage-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      transition: width 0.3s ease;
    }

    /* ============ Empty state ============ */
    .empty {
      text-align: center;
      padding: 32px;
      color: var(--text-3);
      font-size: 13px;
      font-style: italic;
    }

    /* ============ Section title ============ */
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .icon { font-size: 18px; }
    .section-title .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      background: var(--bg-3);
      border-radius: 10px;
      color: var(--text-2);
    }

    /* ============ Tabs in detail ============ */
    .detail-tabs {
      display: flex;
      gap: 2px;
      padding: 4px;
      background: var(--bg-2);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .detail-tab {
      flex: 1;
      padding: 8px 12px;
      background: transparent;
      color: var(--text-2);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s ease;
    }
    .detail-tab:hover { color: var(--text-0); }
    .detail-tab.active { color: var(--text-0); background: var(--bg-3); }

    /* ============ Gaps warning ============ */
    .gaps-warning {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .gaps-warning .title {
      font-weight: 700;
      color: var(--warn);
      margin-bottom: 4px;
    }
    .gaps-warning .gap-item {
      color: var(--text-1);
      font-size: 12px;
      margin-top: 4px;
    }

    /* ============ Filter ============ */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-bar input {
      flex: 1;
      min-width: 200px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--text-0);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
    }
    .filter-bar input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .filter-bar .filter-chip {
      padding: 4px 10px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-2);
    }
    .filter-bar .filter-chip.active {
      background: var(--accent);
      color: #001a26;
      border-color: var(--accent);
    }

    /* ============ Footer ============ */
    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
    }

    /* ============ Responsive ============ */
    @media (max-width: 768px) {
      .app { padding: 16px; }
      .compare-grid { grid-template-columns: 1fr; }
      .lang-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stage-table { font-size: 11px; }
      .stage-table th, .stage-table td { padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="topbar">
      <div>
        <h1>🌍 Language Content Dashboard</h1>
        <div class="meta" id="meta">Loading…</div>
      </div>
      <div class="topbar-actions">
        <button class="btn" id="reloadBtn">🔄 새로고침</button>
        <button class="btn btn-primary" id="expandAllBtn">📖 전체 펼치기</button>
      </div>
    </div>

    <!-- Top-level tabs -->
    <div class="tabs" id="tabs"></div>

    <!-- Main content -->
    <div id="content"></div>

    <div class="footer">
      데이터 출처: <code>Language/wiki/</code>, <code>Language/raw/</code>, <code>Game/raw/</code>, <code>Game/typing_language/prototype/src/data/stages.ts</code>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
