<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Keyboard base -->
  <rect x="1" y="1" width="30" height="30" rx="4" ry="4" fill="#1e1e2e"/>
  <rect x="2" y="2" width="28" height="28" rx="3" ry="3" fill="#2d2d44"/>

  <!-- Language keys: EN blue, JP pink, ES amber, KR green -->
  <rect x="4" y="4" width="11" height="11" rx="2" fill="#3b82f6"/>
  <rect x="17" y="4" width="11" height="11" rx="2" fill="#ec4899"/>
  <rect x="4" y="17" width="11" height="11" rx="2" fill="#f59e0b"/>
  <rect x="17" y="17" width="11" height="11" rx="2" fill="#10b981"/>

  <!-- Key letters: E(n), J(p), E(s), K(r) -->
  <text x="9.5" y="13" font-family="sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">E</text>
  <text x="22.5" y="13" font-family="sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">J</text>
  <text x="9.5" y="26" font-family="sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">E</text>
  <text x="22.5" y="26" font-family="sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">K</text>
</svg>
